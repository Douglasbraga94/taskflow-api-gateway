server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/api/auth/**

            - id: user-service
              uri: ${USER_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/api/users/**

            - id: task-service
              uri: ${TASK_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/api/tasks/**